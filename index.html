<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇫🇷 Français Flash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: Georgia, serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 2rem; color: #f8d673; letter-spacing: 2px; }
  .header p { color: #aaa; font-size: 0.82rem; margin-top: 4px; }
  .container { width: 100%; max-width: 480px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
  .tab.active { background: #f8d673; color: #000; }
  .tab.inactive { background: rgba(255,255,255,0.08); color: #aaa; }

  /* Filters */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip { padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 0.75rem; font-family: Georgia, serif; }
  .chip.active { background: #f8d673; color: #000; font-weight: bold; }
  .chip.inactive { background: rgba(255,255,255,0.08); color: #ccc; }

  /* Speak mode toggle */
  .speak-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: 14px; cursor: pointer; margin-bottom: 10px;
    transition: all 0.3s;
  }
  .speak-toggle.on { border: 2px solid #10b981; background: rgba(16,185,129,0.1); }
  .speak-toggle.off { border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
  .toggle-track { width: 44px; height: 24px; border-radius: 12px; position: relative; transition: background 0.3s; }
  .toggle-thumb { position: absolute; top: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left 0.3s; }

  /* Buttons */
  .btn-gold { padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #f8d673, #f5a623); color: #000; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; font-family: Georgia, serif; }
  .btn-purple { padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; font-family: Georgia, serif; }
  .btn-ghost { padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #aaa; cursor: pointer; font-size: 0.82rem; width: 100%; margin-top: 16px; font-family: Georgia, serif; }

  /* Card */
  .card {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 20px; padding: 32px 52px 28px 20px;
    text-align: center; margin-bottom: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative; cursor: pointer; min-height: 140px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card .label { font-size: 0.68rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-bottom: 10px; }
  .card .word { font-size: 2rem; font-weight: bold; line-height: 1.3; }
  .card .hint { font-size: 0.72rem; color: #888; font-style: italic; margin-top: 8px; }
  .card .meta { font-size: 0.72rem; color: rgba(255,255,255,0.25); margin-top: 4px; }
  .sound-btn {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
    width: 36px; height: 36px; cursor: pointer; font-size: 1rem;
  }

  /* Progress */
  .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 14px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* Quiz options */
  .option {
    padding: 13px 16px; border-radius: 12px;
    font-size: 0.92rem; cursor: pointer; text-align: left;
    transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
    width: 100%; font-family: Georgia, serif; margin-bottom: 8px;
  }
  .option:disabled { cursor: not-allowed; }

  /* Flip buttons */
  .flip-btns { display: flex; gap: 10px; margin-top: 12px; }
  .flip-btn { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 0.9rem; cursor: pointer; font-family: Georgia, serif; }

  /* Speak challenge */
  .speak-box {
    border-radius: 14px; padding: 16px; margin-top: 14px; text-align: center;
  }
  .speak-label { font-size: 0.72rem; color: #f8d673; letter-spacing: 1px; margin-bottom: 10px; }
  .speak-target { font-size: 1.1rem; color: #fff; font-weight: bold; margin-bottom: 16px; line-height: 1.4; }
  .mic-btn {
    width: 70px; height: 70px; border-radius: 50%; border: none;
    font-size: 1.8rem; cursor: pointer; transition: all 0.3s; margin: 0 auto; display: block;
  }
  .mic-hint { margin-top: 8px; font-size: 0.75rem; color: #888; }
  .spoken-text { margin-top: 10px; font-size: 0.82rem; color: #aaa; font-style: italic; }
  .speak-result { margin-top: 10px; font-size: 0.9rem; font-weight: bold; padding: 10px; border-radius: 10px; }
  .speak-ok { color: #34d399; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); }
  .speak-fail { color: #fca5a5; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }

  /* Result screen */
  .result { text-align: center; max-width: 380px; }
  .result .trophy { font-size: 5rem; margin-bottom: 12px; }
  .result .score { font-size: 2rem; font-weight: bold; color: #f8d673; margin-bottom: 6px; }
  .result .msg { color: #ccc; margin-bottom: 28px; font-size: 1rem; }

  /* Verb tables */
  .verb-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .verb-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .verb-table td { padding: 9px 8px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.07); }

  /* Dir toggle */
  .dir-toggle {
    display: flex; align-items: center; gap: 8px; justify-content: center;
    margin-bottom: 14px; font-size: 0.8rem; color: #aaa;
  }
  .dir-toggle button {
    padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer;
    font-size: 0.75rem; font-family: Georgia, serif;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 6px rgba(239,68,68,0.2); }
    50% { box-shadow: 0 0 0 16px rgba(239,68,68,0.05); }
  }
  @keyframes wave {
    0%,100% { height: 6px; }
    50% { height: 26px; }
  }

  /* Hidden sections */
  .section { display: none; }
  .section.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>🇫🇷 Français Flash</h1>
  <p>Vocabulaire & Conjugaisons · A1 / A2</p>
</div>

    </div>

      </div>

        <button class="btn-purple" onclick="startGame('quiz')">🧠 Multiple Choice Quiz</button>

    </div>

    <div id="panel-tablas" style="display:none;">

  </div>

  <!-- FLASHCARD -->

    <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#888;margin-bottom:6px;">

    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-bar" style="background:#f8d673;width:0%"></div></div>

    <div class="card" id="fc-card" onclick="flipCard()">
      <div style="position:absolute;top:10px;right:10px;display:flex;gap:6px;">
        <button class="sound-btn" style="position:static;" onclick="event.stopPropagation();speakText(currentCard().fr)">🔊</button>
        <button id="fc-mic-status" style="position:static;background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1rem;display:none;" onclick="event.stopPropagation();startRecognition(currentCard().fr,'fc-speak-box')">🎤</button>
      </div>
      <div class="label" id="fc-label">FRANÇAIS</div>
      <div class="word" id="fc-word">—</div>
      <div class="hint" id="fc-hint"></div>
      <div class="meta" id="fc-meta"></div>
    </div>

    <div id="fc-flip-btns" style="display:none;">
      <div class="flip-btns">
        <button class="flip-btn" id="fc-btn-repasar" style="background:rgba(255,255,255,0.09);color:#fff;" onclick="nextCard()">😅 Review</button>
        <button class="flip-btn" id="fc-btn-sé" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:bold;" onclick="nextCard()">✅ Got it!</button>
      </div>
    </div>

    <div id="fc-speak-box" style="display:none;"></div>
    <button class="btn-ghost" onclick="showMenu()">← Menu</button>
  </div>

  <!-- QUIZ -->
  <div id="s-quiz" class="section">
    <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#888;margin-bottom:6px;">
      <span>⭐ <span id="qz-score">0</span> pts</span>
      <span id="qz-progress-txt">1 / ?</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="qz-bar" style="background:#a78bfa;width:0%"></div></div>

    <div class="card" style="cursor:default;">
      <div style="position:absolute;top:10px;right:10px;display:flex;gap:6px;">
        <button class="sound-btn" style="position:static;" onclick="speakText(currentCard().fr)">🔊</button>
        <button id="qz-mic-status" style="position:static;background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1rem;display:none;" onclick="startRecognition(currentCard().fr,'qz-speak-box')">🎤</button>
      </div>
      <div class="label" id="qz-label">FRANÇAIS</div>
      <div class="word" id="qz-word">—</div>
      <div class="hint" id="qz-hint"></div>
      <div class="meta" id="qz-meta"></div>
    </div>

    <div id="qz-options"></div>
    <div id="qz-speak-box" style="display:none;"></div>
    <button class="btn-ghost" onclick="showMenu()">← Menu</button>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="section">
    <div class="result">
      <div class="trophy" id="res-trophy">🏆</div>
      <div class="score" id="res-score">0 / 0</div>
      <div class="msg" id="res-msg">¡Bien!</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn-purple" onclick="startGame(lastMode)">🔄 Play again</button>
        <button class="btn-gold" onclick="showMenu()">🏠 Main Menu</button>
      </div>
    </div>
  </div>
</div>

const conjCards = conjugations.flatMap(v => v.rows.map(r => ({
  fr: r.fr, es: r.es, level: v.level, category: "Conjugations", hint: `${v.verb} = ${v.meaning}`
})));

const allCards = [...vocab, ...conjCards, ...frases];
const categoryEmojis = {
  Greetings:"👋",Family:"👨‍👩‍👧",Colors:"🎨",Body:"🫀",Places:"📍",
  Conjugations:"🔤",Phrases:"💬",Weather:"🌤️",Food:"🍽️",
  Time:"⏰",Adjectives:"✨",Transport:"🚆",All:"🃏"
};

// ─── STATE ──────────────────────────────────────────────────────────────────
let selectedLevel = "A1+A2";
let selectedCat = "All";
let showDir = "fr";
let speakMode = false;
let deck = [];
let deckIndex = 0;
let score = 0;
let isFlipped = false;
let selectedOpt = null;
let options = [];
let lastMode = "flashcard";
let spokePassed = false;
let recognition = null;

// ─── INIT ───────────────────────────────────────────────────────────────────
function init() {
  buildLevelChips();
  buildCatChips();
  buildVerbLevelChips();
  renderVerbList("A1+A2");
}

function buildLevelChips() {
  const el = document.getElementById("level-chips");
  ["A1+A2","A1","A2"].forEach(l => {
    const b = document.createElement("button");
    b.className = "chip " + (l === selectedLevel ? "active" : "inactive");
    b.textContent = l === "A1+A2" ? "A1 + A2" : l;
    b.onclick = () => { selectedLevel = l; buildLevelChips(); buildCatChips(); };
    el.appendChild(b);
  });
}

function buildCatChips() {
  const filtered = allCards.filter(c => selectedLevel === "A1+A2" || c.level === selectedLevel);
  const cats = ["All", ...new Set(filtered.map(c => c.category))];
  if (!cats.includes(selectedCat)) selectedCat = "All";
  const el = document.getElementById("cat-chips");
  el.innerHTML = "";
  cats.forEach(cat => {
    const b = document.createElement("button");
    b.className = "chip " + (cat === selectedCat ? "active" : "inactive");
    b.textContent = (categoryEmojis[cat] || "") + " " + cat;
    b.onclick = () => { selectedCat = cat; buildCatChips(); };
    el.appendChild(b);
  });
}

function buildVerbLevelChips() {
  const el = document.getElementById("verb-level-chips");
  ["A1+A2","A1","A2"].forEach(l => {
    const b = document.createElement("button");
    b.className = "chip " + (l === "A1+A2" ? "active" : "inactive");
    b.textContent = l === "A1+A2" ? "A1 + A2" : l;
    b.onclick = (e) => {
      el.querySelectorAll(".chip").forEach(c => { c.className = "chip inactive"; });
      e.target.className = "chip active";
      renderVerbList(l);
    };
    el.appendChild(b);
  });
}

function renderVerbList(lvl) {
  const el = document.getElementById("verb-list");
  el.innerHTML = "";
  const verbs = conjugations.filter(v => lvl === "A1+A2" || v.level === lvl);
  verbs.forEach(v => {
    const card = document.createElement("div");
    card.className = "verb-card";
    card.innerHTML = `<div><strong style="color:#f8d673;font-size:1.1rem">${v.verb}</strong><span style="color:#aaa;font-size:0.8rem;margin-left:8px">${v.meaning}</span></div><span style="color:#888;font-size:0.8rem">${v.level} ▼</span>`;
    const tableWrap = document.createElement("div");
    tableWrap.style.display = "none";
    tableWrap.style.padding = "0 0 12px 0";
    const tbl = document.createElement("table");
    tbl.className = "verb-table";
    v.rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td style="color:#a78bfa;font-weight:bold">${r.fr}</td><td style="color:#ccc">${r.es}</td><td style="text-align:right"><button onclick="speakText('${r.fr.replace(/'/g,"\\'")}');event.stopPropagation();" style="background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer">🔊</button></td>`;
      tbl.appendChild(tr);
    });
    tableWrap.appendChild(tbl);
    card.onclick = () => { tableWrap.style.display = tableWrap.style.display === "none" ? "block" : "none"; };
    el.appendChild(card);
    el.appendChild(tableWrap);
  });
}

function switchTab(tab) {
  document.getElementById("tab-jugar").className = "tab " + (tab === "jugar" ? "active" : "inactive");
  document.getElementById("tab-tablas").className = "tab " + (tab === "tablas" ? "active" : "inactive");

  document.getElementById("panel-tablas").style.display = tab === "tablas" ? "block" : "none";
}

function toggleDir() {
  showDir = showDir === "fr" ? "es" : "fr";
  document.getElementById("dir-btn").textContent = showDir === "fr" ? "FR → EN" : "EN → FR";
}

function toggleSpeakMode() {
  speakMode = !speakMode;
  const tog = document.getElementById("speak-toggle");
  const track = document.getElementById("toggle-track");
  const thumb = document.getElementById("toggle-thumb");
  const label = document.getElementById("speak-toggle-label");

// ─── GAME ───────────────────────────────────────────────────────────────────
function getFiltered() {
  return allCards.filter(c => {
    const lvl = selectedLevel === "A1+A2" || c.level === selectedLevel;
    const cat = selectedCat === "All" || c.category === selectedCat;
    return lvl && cat;
  });
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function generateOptions(correct, all) {
  const others = shuffle(all.filter(c => c.es !== correct.es)).slice(0,3);
  return shuffle([correct, ...others]);
}

function currentCard() { return deck[deckIndex]; }

function startGame(mode) {
  lastMode = mode;
  const filtered = getFiltered();
  if (!filtered.length) { alert("No cards match these filters."); return; }
  deck = shuffle(filtered);
  deckIndex = 0; score = 0; isFlipped = false; selectedOpt = null; spokePassed = false;
  if (mode === "quiz") options = generateOptions(deck[0], filtered);
  showSection("s-" + mode);
  renderCard(mode);
  autoSpeak();
}

function showSection(id) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showMenu() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  showSection("s-menu");
}

function nextCard() {
  if (speakMode && !spokePassed) return;
  deckIndex++;
  if (deckIndex >= deck.length) { showResult(); return; }
  isFlipped = false; selectedOpt = null; spokePassed = false;
  const filtered = getFiltered();
  if (lastMode === "quiz") options = generateOptions(deck[deckIndex], filtered);
  renderCard(lastMode);
  autoSpeak();
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  renderCard("flashcard");
}

function handleAnswer(idx) {
  if (selectedOpt !== null) return;
  if (speakMode && !spokePassed) return;
  selectedOpt = idx;
  const card = currentCard();
  if (options[idx].es === card.es) score++;
  renderCard("quiz");
  setTimeout(nextCard, 1200);
}

function renderCard(mode) {
  const card = currentCard();
  const pct = deck.length > 0 ? (deckIndex / deck.length) * 100 : 0;

  if (mode === "flashcard") {
    document.getElementById("fc-score").textContent = score;
    document.getElementById("fc-progress-txt").textContent = `${deckIndex+1} / ${deck.length}`;
    document.getElementById("fc-bar").style.width = pct + "%";

    const front = showDir === "fr";
    if (!isFlipped) {
      document.getElementById("fc-label").textContent = front ? "FRANÇAIS" : "ESPAÑOL";
      document.getElementById("fc-word").textContent = front ? card.fr : card.es;
      document.getElementById("fc-hint").textContent = "";
      document.getElementById("fc-meta").textContent = card.category + " · " + card.level;
      document.getElementById("fc-flip-btns").style.display = "none";
      document.getElementById("fc-speak-box").style.display = "none";
    } else {
      document.getElementById("fc-label").textContent = front ? "ESPAÑOL" : "FRANÇAIS";
      document.getElementById("fc-word").textContent = front ? card.es : card.fr;
      document.getElementById("fc-hint").textContent = card.hint || "";
      document.getElementById("fc-meta").textContent = "";

      const locked = speakMode && !spokePassed;
      document.getElementById("fc-flip-btns").style.display = "block";
      document.getElementById("fc-btn-repasar").disabled = locked;
      document.getElementById("fc-btn-sé").disabled = locked;
      document.getElementById("fc-btn-repasar").style.opacity = locked ? "0.3" : "1";
      document.getElementById("fc-btn-sé").style.opacity = locked ? "0.3" : "1";

      if (speakMode) {
        document.getElementById("fc-speak-box").style.display = "block";
        renderSpeakBox("fc-speak-box", card.fr);
      }
    }
  }

  if (mode === "quiz") {
    document.getElementById("qz-score").textContent = score;
    document.getElementById("qz-progress-txt").textContent = `${deckIndex+1} / ${deck.length}`;
    document.getElementById("qz-bar").style.width = pct + "%";

    const front = showDir === "fr";
    document.getElementById("qz-label").textContent = front ? "FRANÇAIS" : "ESPAÑOL";
    document.getElementById("qz-word").textContent = front ? card.fr : card.es;
    document.getElementById("qz-hint").textContent = card.hint || "";
    document.getElementById("qz-meta").textContent = card.category + " · " + card.level;

    const optEl = document.getElementById("qz-options");
    optEl.innerHTML = "";
    options.forEach((opt, i) => {
      const isCorrect = opt.es === card.es;
      const isSelected = selectedOpt === i;
      const locked = speakMode && !spokePassed;
      let bg = "rgba(255,255,255,0.07)", border = "1px solid rgba(255,255,255,0.14)", color = "#fff";
      if (selectedOpt !== null) {
        if (isCorrect) { bg = "rgba(16,185,129,0.25)"; border = "1px solid #10b981"; }
        else if (isSelected) { bg = "rgba(239,68,68,0.25)"; border = "1px solid #ef4444"; }
      }
      if (locked) { bg = "rgba(255,255,255,0.03)"; color = "#444"; }
      const btn = document.createElement("button");
      btn.className = "option";
      btn.style.cssText = `background:${bg};border:${border};color:${color};`;
      btn.disabled = locked || selectedOpt !== null;
      btn.innerHTML = `<span>${front ? opt.es : opt.fr}</span>${selectedOpt !== null && isCorrect ? "<span>✅</span>" : ""}${selectedOpt !== null && isSelected && !isCorrect ? "<span>❌</span>" : ""}`;
      btn.onclick = () => handleAnswer(i);
      optEl.appendChild(btn);
    });

    if (speakMode) {
      document.getElementById("qz-speak-box").style.display = "block";
      renderSpeakBox("qz-speak-box", card.fr);
    } else {
      document.getElementById("qz-speak-box").style.display = "none";
    }
  }
}

function renderSpeakBox(containerId, targetFr) {
  const el = document.getElementById(containerId);
  if (!el) return;

  // Show mic button in card
  const micId = containerId === "fc-speak-box" ? "fc-mic-status" : "qz-mic-status";
  const micBtn = document.getElementById(micId);

  if (spokePassed) {
    el.innerHTML = `<div class="speak-box" style="border:1px solid rgba(52,211,153,0.4);background:rgba(52,211,153,0.07);text-align:center;padding:12px;border-radius:14px;margin-top:10px;">
      <div class="speak-result speak-ok" style="margin:0;">✅ Parfait! You can continue 👇</div>
    </div>`;
    if (micBtn) { micBtn.textContent = "✅"; micBtn.style.display = "flex"; micBtn.style.background = "rgba(52,211,153,0.2)"; micBtn.style.alignItems = "center"; micBtn.style.justifyContent = "center"; }
    return;
  }

  el.innerHTML = `<div style="text-align:center;padding:10px 14px;margin-top:10px;border-radius:14px;border:1px solid rgba(248,214,115,0.2);background:rgba(255,255,255,0.03);">
    <div style="font-size:0.7rem;color:#f8d673;letter-spacing:1px;margin-bottom:6px;">🗣️ PRONOUNCE THIS PHRASE TO CONTINUE</div>
    <div style="font-size:1rem;color:#fff;font-weight:bold;margin-bottom:8px;">« ${targetFr} »</div>
    <div id="mic-status-text-${containerId}" style="font-size:0.78rem;color:#ef4444;">🔴 Listening... say it in French</div>
    <div id="spoken-${containerId}" style="font-size:0.78rem;color:#aaa;font-style:italic;margin-top:4px;"></div>
    <div id="speak-result-${containerId}"></div>
  </div>`;

  // Show pulsing mic in card
  if (micBtn) {
    micBtn.textContent = "🔴";
    micBtn.style.display = "flex";
    micBtn.style.alignItems = "center";
    micBtn.style.justifyContent = "center";
    micBtn.style.background = "rgba(239,68,68,0.2)";
    micBtn.style.animation = "pulse 1s infinite";
    micBtn.title = "Click to restart mic";
  }

  setTimeout(() => startRecognition(targetFr, containerId), 400);

// ─── SPEECH RECOGNITION ─────────────────────────────────────────────────────
let recognitionTimeout = null;

function resetMicBtn(btn, hint, targetFr, containerId) {
  // btn/hint params kept for compatibility but we use card mic icon now
  const micId = containerId === "fc-speak-box" ? "fc-mic-status" : "qz-mic-status";
  const micBtn = document.getElementById(micId);
  if (micBtn) {
    micBtn.textContent = "🎤";
    micBtn.style.animation = "none";
    micBtn.style.background = "rgba(255,255,255,0.08)";
    micBtn.onclick = () => startRecognition(targetFr, containerId);
  }
  const statusEl = document.getElementById("mic-status-text-"+containerId);
  if (statusEl) statusEl.textContent = "Click 🎤 in the card to try again";
  if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }
}

function startRecognition(targetFr, containerId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById("speak-result-"+containerId).innerHTML =
      `<div class="speak-result speak-fail">⚠️ Your browser does not support speech recognition. Use Chrome.</div>`;
    return;
  }

  if (recognition) { try { recognition.abort(); } catch(e){} recognition = null; }
  if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout = null; }

  recognition = new SR();
  recognition.lang = "fr-FR";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;

  const btn = null; // no longer used
  const hint = null;
  const resEl = document.getElementById("speak-result-"+containerId);
  const statusEl = document.getElementById("mic-status-text-"+containerId);
  const micId = containerId === "fc-speak-box" ? "fc-mic-status" : "qz-mic-status";
  const micBtn = document.getElementById(micId);

  // Update card mic icon to pulsing red
  if (micBtn) {
    micBtn.textContent = "🔴";
    micBtn.style.background = "rgba(239,68,68,0.2)";
    micBtn.style.animation = "pulse 1s infinite";
    micBtn.onclick = () => startRecognition(targetFr, containerId);
  }
  if (statusEl) statusEl.textContent = "🔴 Listening... say the phrase in French";

  // Auto-cancel after 8 seconds if stuck
  recognitionTimeout = setTimeout(() => {
    if (recognition) { try { recognition.abort(); } catch(e){} recognition = null; }
    resetMicBtn(btn, hint, targetFr, containerId);
    if (resEl) resEl.innerHTML = `<div class="speak-result speak-fail">⏱️ Timed out. Try again — speak clearly after clicking.</div>`;
  }, 8000);

  recognition.onresult = (e) => {
    clearTimeout(recognitionTimeout); recognitionTimeout = null;
    const results = Array.from(e.results[0]).map(r => r.transcript);
    const best = results[0];
    const spokenEl = document.getElementById("spoken-"+containerId);
    if (spokenEl) spokenEl.textContent = `You said: "${best}"`;

    const passed = checkSpeech(best, targetFr);
    if (passed) {
      spokePassed = true;
      if (resEl) resEl.innerHTML = `<div class="speak-result speak-ok">✅ Parfait! You can continue 👇</div>`;
      renderCard(lastMode);
    } else {
      if (statusEl) statusEl.textContent = `❌ Not quite — try again!`;
      if (resEl) resEl.innerHTML = `<div style="font-size:0.78rem;color:#f87171;margin-top:4px;">You said: "${best}"</div>`;
      setTimeout(() => {
        if (!spokePassed) startRecognition(targetFr, containerId);
      }, 1500);
    }
  };

  recognition.onerror = (e) => {
    clearTimeout(recognitionTimeout); recognitionTimeout = null;
    if (e.error === "no-speech") {
      if (statusEl) statusEl.textContent = "🔇 Nothing heard — speak louder!";
      if (resEl) resEl.innerHTML = "";
      setTimeout(() => { if (!spokePassed) startRecognition(targetFr, containerId); }, 1000);
    } else if (e.error === "not-allowed") {
      if (resEl) resEl.innerHTML = `<div class="speak-result speak-fail">🚫 Mic blocked. Click 🔒 in Chrome's address bar.</div>`;
      resetMicBtn(btn, hint, targetFr, containerId);
    } else if (e.error === "aborted") {
      // user cancelled manually, do nothing
    } else {
      if (statusEl) statusEl.textContent = `⚠️ ${e.error} — retrying...`;
      setTimeout(() => { if (!spokePassed) startRecognition(targetFr, containerId); }, 1000);
    }
  };

  recognition.onend = () => {
    clearTimeout(recognitionTimeout); recognitionTimeout = null;
    if (btn && !spokePassed) {
      btn.style.animation = "none";
      btn.style.boxShadow = "0 0 0 6px rgba(16,185,129,0.2)";
    }
    recognition = null;
  };

  try {
    recognition.start();
  } catch(e) {
    resetMicBtn(btn, hint, targetFr, containerId);
    if (resEl) resEl.innerHTML = `<div class="speak-result speak-fail">⚠️ Could not start mic. Try again.</div>`;
  }
}

function normalize(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[.,!?¿¡'"«»]/g,"").replace(/\s+/g," ").trim();
}

function checkSpeech(spoken, target) {
  const s = normalize(spoken);
  const t = normalize(target);
  if (s === t) return true;
  const tWords = t.split(" ");
  const matches = tWords.filter(w => w.length > 2 && s.includes(w));
  return matches.length / tWords.length >= 0.55;
}

// ─── RESULT ─────────────────────────────────────────────────────────────────
function showResult() {
  const pct = score / deck.length;
  document.getElementById("res-trophy").textContent = pct >= 0.8 ? "🏆" : pct >= 0.5 ? "👍" : "💪";
  document.getElementById("res-score").textContent = `${score} / ${deck.length}`;
  document.getElementById("res-msg").textContent = pct >= 0.8 ? "Excellent! Très bien!" : pct >= 0.5 ? "Good job! Keep practicing." : "Keep going, you've got this!";
  showSection("s-result");
}

// ─── AUDIO ──────────────────────────────────────────────────────────────────
function speakText(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang || "fr-FR"; utt.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith((lang||"fr-FR").split("-")[0]));
  if (v) utt.voice = v;
  window.speechSynthesis.speak(utt);
}

function autoSpeak() {
  const card = currentCard();
  if (!card) return;
  setTimeout(() => speakText(showDir === "fr" ? card.fr : card.es, showDir === "fr" ? "fr-FR" : "es-ES"), 300);
}

// ─── START ──────────────────────────────────────────────────────────────────
init();
</script>
