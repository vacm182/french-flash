<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇫🇷 Français Flash</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #111;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 80px;
  position: relative;
  overflow-x: hidden;
}

/* Topographic background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-radial-gradient(ellipse at 30% 40%, transparent 0, transparent 28px, rgba(255,255,255,0.03) 29px, transparent 30px),
    repeating-radial-gradient(ellipse at 70% 60%, transparent 0, transparent 20px, rgba(255,255,255,0.025) 21px, transparent 22px),
    repeating-radial-gradient(ellipse at 50% 20%, transparent 0, transparent 35px, rgba(255,255,255,0.02) 36px, transparent 37px),
    repeating-radial-gradient(ellipse at 20% 80%, transparent 0, transparent 25px, rgba(255,255,255,0.03) 26px, transparent 27px);
  pointer-events: none;
  z-index: 0;
}

.container { width: 100%; max-width: 480px; position: relative; z-index: 1; }

/* Header */
.header {
  text-align: center; margin-bottom: 28px;
  position: relative; z-index: 1;
}
.header h1 {
  font-size: 2.2rem; font-weight: 900; letter-spacing: 4px;
  color: #fff; text-transform: uppercase;
}
.header .tagline {
  font-size: 0.7rem; letter-spacing: 3px; color: #555;
  text-transform: uppercase; margin-top: 4px;
}
.header .version { color: #333; font-size: 0.65rem; margin-top: 2px; letter-spacing:1px; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin-bottom: 20px; background: #1a1a1a; border-radius: 8px; padding: 3px; border: 1px solid #2a2a2a; }
.tab { flex: 1; padding: 9px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; }
.tab.active { background: #fff; color: #000; }
.tab.inactive { background: transparent; color: #555; }

/* Chips */
.filter-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.chip { padding: 5px 12px; border-radius: 3px; border: 1px solid #2a2a2a; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; font-family: inherit; transition: all 0.15s; }
.chip.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }
.chip.inactive { background: transparent; color: #555; }
.chip.inactive:hover { border-color: #444; color: #888; }

/* Level color coding */
.chip[data-level="A1"].active { background: #4ade80; border-color: #4ade80; color: #000; }
.chip[data-level="A2"].active { background: #facc15; border-color: #facc15; color: #000; }
.chip[data-level="B1"].active { background: #fb923c; border-color: #fb923c; color: #000; }
.chip[data-level="B2"].active { background: #f87171; border-color: #f87171; color: #000; }

/* Speak mode toggle */
.speak-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 10px;
  border: 1px solid #2a2a2a; background: #161616; transition: all 0.3s;
}
.speak-toggle.on { border-color: #4ade80; background: rgba(74,222,128,0.05); }
.toggle-track { width: 40px; height: 22px; border-radius: 11px; position: relative; transition: background 0.3s; }
.toggle-thumb { position: absolute; top: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left 0.3s; }

/* Buttons */
.btn-primary { padding: 15px; border-radius: 4px; border: none; background: #fff; color: #000; font-size: 0.85rem; font-weight: 900; cursor: pointer; width: 100%; font-family: inherit; letter-spacing: 2px; text-transform: uppercase; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { padding: 15px; border-radius: 4px; border: 1px solid #333; background: transparent; color: #888; font-size: 0.85rem; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; letter-spacing: 2px; text-transform: uppercase; }
.btn-ghost { padding: 10px; border-radius: 4px; border: 1px solid #222; background: transparent; color: #444; cursor: pointer; font-size: 0.75rem; width: 100%; margin-top: 16px; font-family: inherit; letter-spacing: 1px; text-transform: uppercase; }

/* Card */
.card {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 6px; padding: 36px 56px 32px 24px;
  text-align: center; margin-bottom: 10px;
  position: relative; cursor: pointer; min-height: 150px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.card:hover { border-color: #444; }
.card .label { font-size: 0.6rem; color: #333; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
.card .word { font-size: 2rem; font-weight: 900; line-height: 1.3; letter-spacing: -0.5px; }
.card .hint { font-size: 0.7rem; color: #444; margin-top: 8px; letter-spacing: 1px; }
.card .meta { font-size: 0.62rem; color: #2a2a2a; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }
.level-badge {
  position: absolute; top: 10px; left: 12px;
  font-size: 0.55rem; font-weight: 900; letter-spacing: 1px;
  padding: 2px 7px; border-radius: 2px;
}
.badge-A1 { background: #4ade80; color: #000; }
.badge-A2 { background: #facc15; color: #000; }
.badge-B1 { background: #fb923c; color: #000; }
.badge-B2 { background: #f87171; color: #000; }

.sound-btn {
  position: absolute; top: 10px; right: 10px;
  background: #1f1f1f; border: 1px solid #2a2a2a; border-radius: 3px;
  width: 32px; height: 32px; cursor: pointer; font-size: 0.85rem; color: #555;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.sound-btn:hover { border-color: #444; color: #fff; }

/* Progress */
.progress-bar { height: 2px; background: #1f1f1f; margin-bottom: 12px; }
.progress-fill { height: 100%; transition: width 0.4s; }

/* Stats row */
.stats-row { display: flex; justify-content: space-between; font-size: 0.65rem; color: #333; margin-bottom: 6px; letter-spacing: 2px; text-transform: uppercase; }

/* Quiz timer bar */
#qz-timer-wrap { height: 4px; background: #1a1a1a; border-radius: 0 0 6px 6px; overflow: hidden; margin-top: -1px; }
#qz-timer-bar { height: 100%; width: 100%; background: #4ade80; transition: background 0.4s; }
#qz-timer-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 2px 6px; }
#qz-timer-label { font-size: 0.6rem; color: #444; letter-spacing: 1px; }
#qz-count-row { display: flex; gap: 6px; margin-bottom: 10px; }
.count-chip { padding: 4px 12px; border-radius: 20px; border: 1px solid #2a2a2a; cursor: pointer; font-size: 0.65rem; font-family: inherit; background: transparent; color: #555; letter-spacing: 1px; transition: all 0.15s; }
.count-chip.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }

/* Quiz options */
.option {
  padding: 12px 16px; border-radius: 4px; border: 1px solid #222;
  font-size: 0.88rem; cursor: pointer; text-align: left;
  transition: all 0.15s; display: flex; justify-content: space-between; align-items: center;
  width: 100%; font-family: inherit; margin-bottom: 6px;
  background: #161616; color: #aaa;
}
.option:hover:not(:disabled) { border-color: #444; color: #fff; }

/* Flip buttons */
.flip-btns { display: flex; gap: 8px; margin-top: 10px; }
.flip-btn { flex: 1; padding: 13px; border-radius: 4px; border: none; font-size: 0.8rem; cursor: pointer; font-family: inherit; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

/* Speak box */
.speak-box { border-radius: 6px; padding: 14px; margin-top: 10px; text-align: center; border: 1px solid #2a2a2a; background: #161616; }

/* Verb tables */
.verb-card {
  background: #161616; border: 1px solid #222; border-radius: 6px;
  padding: 14px 16px; margin-bottom: 6px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  transition: border-color 0.2s;
}
.verb-card:hover { border-color: #333; }
.verb-table { width: 100%; border-collapse: collapse; }
.verb-table td { padding: 8px 8px; font-size: 0.85rem; border-bottom: 1px solid #1f1f1f; }

/* Dir toggle */
.dir-toggle { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 12px; font-size: 0.7rem; color: #444; letter-spacing: 1px; }
.dir-toggle button { padding: 5px 14px; border-radius: 3px; border: 1px solid #333; cursor: pointer; font-size: 0.7rem; font-family: inherit; background: #1a1a1a; color: #888; letter-spacing: 1px; }

/* Result */
.result { text-align: center; }
.result .trophy { font-size: 4rem; margin-bottom: 12px; }
.result .score { font-size: 3rem; font-weight: 900; color: #fff; margin-bottom: 4px; letter-spacing: -2px; }
.result .msg { color: #444; margin-bottom: 28px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(239,68,68,0.15); }
  50% { box-shadow: 0 0 0 10px rgba(239,68,68,0.05); }
}
@keyframes wave {
  0%,100% { height: 4px; }
  50% { height: 22px; }
}

.section { display: none; }
.section.active { display: block; }

/* Topo line decoration */
.topo-line {
  width: 100%; height: 30px; margin: 6px 0;
  opacity: 0.12; pointer-events: none;
}
</style>
</head>
<body>

<div class="header">
  <h1>🇫🇷 Français</h1>
  <div class="tagline">Vocabulary · Conjugations · A1 → B2</div>
  <div class="version">v2.6</div>
</div>

<!-- Topo decoration -->
<svg class="topo-line" viewBox="0 0 480 30" preserveAspectRatio="none">
  <path d="M0,15 C40,5 80,25 120,15 C160,5 200,20 240,10 C280,0 320,22 360,12 C400,2 440,18 480,15" stroke="white" stroke-width="1" fill="none"/>
  <path d="M0,20 C50,10 90,28 140,18 C190,8 230,24 280,14 C330,4 370,22 420,16 C450,12 465,18 480,20" stroke="white" stroke-width="0.7" fill="none" opacity="0.5"/>
</svg>

<div class="container">
  <!-- MENU -->
  <div id="s-menu" class="section active">
    <div class="tabs">
      <button class="tab active" id="tab-play" onclick="switchTab('play')">Play</button>
      <button class="tab inactive" id="tab-verbs" onclick="switchTab('verbs')">Verbs</button>
      <button class="tab inactive" id="tab-chat" onclick="switchTab('chat')">Chat</button>
    </div>

    <div id="panel-play">
      <div class="filter-row" id="level-chips"></div>
      <div class="filter-row" id="cat-chips"></div>

      <div class="dir-toggle">
        <span>Direction</span>
        <button id="dir-btn" onclick="toggleDir()">FR → EN</button>
      </div>

      <div class="speak-toggle off" id="speak-toggle" onclick="toggleSpeakMode()">
        <div>
          <div style="font-weight:700;font-size:0.85rem;letter-spacing:1px;" id="speak-toggle-label">🎤 SPEAKING MODE</div>
          <div style="font-size:0.7rem;color:#444;margin-top:2px;letter-spacing:1px;">Pronounce each phrase to advance</div>
        </div>
        <div class="toggle-track" id="toggle-track" style="background:#222;">
          <div class="toggle-thumb" id="toggle-thumb" style="left:3px;"></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
        <button class="btn-primary" onclick="startGame('flashcard')">▶ Flashcards</button>
        <div style="font-size:0.6rem;color:#444;letter-spacing:2px;text-transform:uppercase;margin-top:4px;margin-bottom:2px;">Questions</div>
        <div id="qz-count-row" class="filter-row">
          <button class="count-chip active" onclick="setQuizLen(10,this)">10</button>
          <button class="count-chip" onclick="setQuizLen(20,this)">20</button>
          <button class="count-chip" onclick="setQuizLen(50,this)">50</button>
          <button class="count-chip" onclick="setQuizLen(100,this)">100</button>
        </div>
        <button class="btn-secondary" onclick="startGame('quiz')">◈ Multiple Choice</button>
        <button class="btn-secondary" onclick="startGame('oral')" style="border-color:#fb923c;color:#fb923c;">🎧 Oral Comprehension</button>

        <div id="tts-status" onclick="testTTS()" style="
          margin-top:4px; padding:8px 12px; border-radius:4px;
          border:1px solid #222; background:#111; cursor:pointer;
          display:flex; align-items:center; gap:8px;
          font-size:0.65rem; letter-spacing:1px; color:#444;
        ">
          <span id="tts-dot" style="width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;"></span>
          <span id="tts-msg">Tap to test voice quality</span>
        </div>
      </div>
    </div>

    <div id="panel-verbs" style="display:none;">
      <div class="filter-row" id="verb-level-chips"></div>
      <div id="verb-list"></div>
    </div>

    <div id="panel-chat" style="display:none;">
      <div style="font-size:0.6rem;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Choose a scenario</div>
      <div id="scenario-list"></div>
    </div>
  </div>

  <!-- FLASHCARD -->
  <div id="s-flashcard" class="section">
    <div class="stats-row">
      <span>⭐ <span id="fc-score">0</span></span>
      <span id="fc-progress-txt">1 / ?</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-bar" style="background:#fff;width:0%"></div></div>

    <div class="card" id="fc-card" onclick="flipCard()">
      <div id="fc-level-badge" class="level-badge"></div>
      <button class="sound-btn" onclick="event.stopPropagation();speakText(currentCard().fr,'fr-FR')">🔊</button>
      <div class="label" id="fc-label">Français</div>
      <div class="word" id="fc-word">—</div>
      <div class="hint" id="fc-hint"></div>
      <div class="meta" id="fc-meta"></div>
    </div>

    <div id="fc-flip-btns" style="display:none;">
      <div class="flip-btns">
        <button class="flip-btn" id="fc-btn-review" style="background:#1f1f1f;color:#888;border:1px solid #2a2a2a;" onclick="nextCard()">✗ Review</button>
        <button class="flip-btn" id="fc-btn-got" style="background:#fff;color:#000;" onclick="nextCard()">✓ Got it</button>
      </div>
    </div>

    <div id="fc-speak-box" style="display:none;"></div>
    <button class="btn-ghost" onclick="showMenu()">← Menu</button>
  </div>

  <!-- QUIZ -->
  <div id="s-quiz" class="section">
    <div class="stats-row">
      <span>⭐ <span id="qz-score">0</span></span>
      <span id="qz-progress-txt">1 / ?</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="qz-bar" style="background:#fff;width:0%"></div></div>

    <div id="qz-timer-wrap"><div id="qz-timer-bar"></div></div>
    <div id="qz-timer-row">
      <span id="qz-timer-label">10s</span>
    </div>

    <div class="card" style="cursor:default;">
      <div id="qz-level-badge" class="level-badge"></div>
      <button class="sound-btn" onclick="speakText(currentCard().fr,'fr-FR')">🔊</button>
      <div class="label" id="qz-label">Français</div>
      <div class="word" id="qz-word">—</div>
      <div class="hint" id="qz-hint"></div>
      <div class="meta" id="qz-meta"></div>
    </div>

    <div id="qz-options"></div>
    <div id="qz-speak-box" style="display:none;"></div>
    <button class="btn-ghost" onclick="showMenu()">← Menu</button>
  </div>

  <!-- ORAL COMPREHENSION -->
  <div id="s-oral" class="section">
    <div class="stats-row">
      <span>⭐ <span id="or-score">0</span></span>
      <span id="or-progress-txt">1 / ?</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="or-bar" style="background:#fb923c;width:0%"></div></div>
    <div id="or-timer-wrap" style="height:4px;background:#1a1a1a;border-radius:0 0 6px 6px;overflow:hidden;margin-top:-1px;"><div id="or-timer-bar" style="height:100%;width:100%;background:#fb923c;transition:background 0.4s;"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 2px 6px;">
      <span id="or-timer-label" style="font-size:0.6rem;color:#444;letter-spacing:1px;">20s</span>
    </div>

    <!-- Audio card — NO text shown -->
    <div class="card" style="cursor:default;text-align:center;">
      <div id="or-level-badge" class="level-badge"></div>
      <div id="or-cat" style="font-size:0.6rem;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;"></div>
      <button id="or-play-btn" onclick="orPlay()" style="
        width:80px;height:80px;border-radius:50%;
        background:linear-gradient(135deg,#fff,#ccc);
        border:none;cursor:pointer;font-size:2rem;
        display:flex;align-items:center;justify-content:center;
        margin:0 auto 12px;
        box-shadow:0 0 28px rgba(255,255,255,0.15);
        transition:transform 0.12s;
      ">🔊</button>
      <div id="or-play-hint" style="font-size:0.65rem;color:#444;letter-spacing:1px;">Tap to hear · fast speed</div>
      <div id="or-reveal" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #1f1f1f;">
        <div style="font-size:0.6rem;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">The phrase was:</div>
        <div id="or-reveal-text" style="font-size:1.4rem;font-weight:900;color:#fff;"></div>
      </div>
    </div>

    <div id="or-options"></div>
    <button class="btn-ghost" onclick="orStop();showMenu()">← Menu</button>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="section">
    <div class="result">
      <div class="trophy" id="res-trophy">🏆</div>
      <div class="score" id="res-score">0 / 0</div>
      <div class="msg" id="res-msg">Keep going</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <button class="btn-primary" onclick="startGame(lastMode)">↺ Play Again</button>
        <button class="btn-secondary" onclick="showMenu()">← Main Menu</button>
      </div>
    </div>
  </div>

  <!-- CONVERSATION -->
  <div id="s-conv" class="section">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button class="btn-ghost" style="width:auto;margin:0;padding:6px 12px;" onclick="showMenu()">←</button>
      <div>
        <div id="conv-title" style="font-weight:900;font-size:0.95rem;letter-spacing:1px;"></div>
        <div id="conv-level-tag" style="font-size:0.6rem;color:#444;letter-spacing:2px;"></div>
      </div>
      <div id="conv-char-avatar" style="margin-left:auto;font-size:2rem;"></div>
    </div>

    <!-- Chat messages -->
    <div id="conv-messages" style="
      min-height:300px;max-height:420px;overflow-y:auto;
      border:1px solid #1f1f1f;border-radius:6px;
      padding:14px;margin-bottom:10px;
      display:flex;flex-direction:column;gap:10px;
      background:#0d0d0d;
    "></div>

    <!-- Hint strip -->
    <div id="conv-hint" style="
      font-size:0.7rem;color:#333;letter-spacing:1px;
      padding:8px 10px;border:1px solid #1a1a1a;border-radius:4px;
      margin-bottom:8px;min-height:30px;line-height:1.5;
      display:none;
    "></div>

    <!-- Input area -->
    <div style="display:flex;gap:6px;align-items:stretch;">
      <textarea id="conv-input" placeholder="Type your reply in French..." style="
        flex:1;background:#161616;border:1px solid #2a2a2a;border-radius:4px;
        color:#fff;font-family:inherit;font-size:0.9rem;padding:10px 12px;
        resize:none;height:52px;outline:none;line-height:1.4;
      " onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendConvMessage();}"></textarea>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <button onclick="sendConvMessage()" style="
          background:#fff;color:#000;border:none;border-radius:4px;
          font-weight:900;font-size:0.75rem;padding:0 14px;cursor:pointer;
          height:24px;letter-spacing:1px;font-family:inherit;
        ">SEND</button>
        <button onclick="toggleConvMic()" id="conv-mic-btn" style="
          background:#1f1f1f;color:#888;border:1px solid #2a2a2a;border-radius:4px;
          font-size:0.75rem;padding:0 14px;cursor:pointer;
          height:24px;letter-spacing:1px;font-family:inherit;
        ">🎤 MIC</button>
      </div>
    </div>

    <div id="conv-mic-status" style="font-size:0.65rem;color:#333;margin-top:4px;letter-spacing:1px;min-height:14px;"></div>

    <button onclick="toggleHint()" style="
      background:transparent;border:1px solid #1f1f1f;border-radius:3px;
      color:#333;font-size:0.65rem;padding:4px 12px;cursor:pointer;
      margin-top:8px;letter-spacing:1px;font-family:inherit;
    ">💡 HINT</button>
  </div>

</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const vocab = [
  // A1 - Greetings
  {fr:"Bonjour",en:"Hello / Good morning",level:"A1",category:"Greetings"},
  {fr:"Bonsoir",en:"Good evening",level:"A1",category:"Greetings"},
  {fr:"Au revoir",en:"Goodbye",level:"A1",category:"Greetings"},
  {fr:"Merci",en:"Thank you",level:"A1",category:"Greetings"},
  {fr:"S'il vous plaît",en:"Please",level:"A1",category:"Greetings"},
  {fr:"Enchanté(e)",en:"Nice to meet you",level:"A1",category:"Greetings"},
  {fr:"Excusez-moi",en:"Excuse me",level:"A1",category:"Greetings"},
  // A1 - Family
  {fr:"La mère",en:"The mother",level:"A1",category:"Family"},
  {fr:"Le père",en:"The father",level:"A1",category:"Family"},

function init() {
  buildLevelChips(); buildCatChips(); buildVerbLevelChips(); renderVerbList("All");
}

function buildLevelChips() {
  const el = document.getElementById("level-chips");
  el.innerHTML = "";
  ["All","A1","A2","B1","B2"].forEach(l => {
    const b = document.createElement("button");
    b.className = "chip " + (l === selectedLevel ? "active" : "inactive");
    b.textContent = l;
    if (l !== "All") b.setAttribute("data-level", l);
    b.onclick = () => { selectedLevel = l; buildLevelChips(); buildCatChips(); };
    el.appendChild(b);
  });
}

function buildCatChips() {
  const filtered = allCards.filter(c => selectedLevel === "All" || c.level === selectedLevel);
  const cats = ["All", ...new Set(filtered.map(c => c.category))];
  if (!cats.includes(selectedCat)) selectedCat = "All";
  const el = document.getElementById("cat-chips");
  el.innerHTML = "";
  cats.forEach(cat => {
    const b = document.createElement("button");
    b.className = "chip " + (cat === selectedCat ? "active" : "inactive");
    b.textContent = (categoryEmojis[cat] || "") + " " + cat;
    b.onclick = () => { selectedCat = cat; buildCatChips(); };
    el.appendChild(b);
  });
}

function buildVerbLevelChips() {
  const el = document.getElementById("verb-level-chips");
  el.innerHTML = "";
  ["All","A1","A2","B1","B2"].forEach(l => {
    const b = document.createElement("button");
    b.className = "chip " + (l === "All" ? "active" : "inactive");
    b.textContent = l;
    b.onclick = (e) => {
      el.querySelectorAll(".chip").forEach(c => c.className = "chip inactive");
      e.target.className = "chip active";
      renderVerbList(l);
    };
    el.appendChild(b);
  });
}

function renderVerbList(lvl) {
  const el = document.getElementById("verb-list");
  el.innerHTML = "";
  const verbs = conjugations.filter(v => lvl === "All" || v.level === lvl);
  verbs.forEach(v => {
    const card = document.createElement("div");
    card.className = "verb-card";
    const color = levelColors[v.level] || "#fff";
    card.innerHTML = `<div><strong style="color:#fff;font-size:1rem;letter-spacing:-0.5px;">${v.verb}</strong><span style="color:#444;font-size:0.75rem;margin-left:8px;letter-spacing:1px;">${v.meaning}</span></div><span style="font-size:0.6rem;font-weight:900;padding:2px 7px;border-radius:2px;background:${color};color:#000;">${v.level}</span>`;
    const tableWrap = document.createElement("div");
    tableWrap.style.display = "none";
    tableWrap.style.paddingBottom = "10px";
    const tbl = document.createElement("table");
    tbl.className = "verb-table";
    v.rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td style="color:#fff;font-weight:600;">${r.fr}</td><td style="color:#555;">${r.en}</td><td style="text-align:right"><button onclick="speakText('${r.fr.replace(/'/g,"\\'")}','fr-FR');event.stopPropagation();" style="background:#1f1f1f;border:1px solid #2a2a2a;border-radius:3px;width:26px;height:26px;cursor:pointer;color:#555;font-size:0.75rem;">🔊</button></td>`;
      tbl.appendChild(tr);
    });
    tableWrap.appendChild(tbl);
    card.onclick = () => { tableWrap.style.display = tableWrap.style.display === "none" ? "block" : "none"; };
    el.appendChild(card);
    el.appendChild(tableWrap);
  });
}

function switchTab(tab) {
  document.getElementById("tab-play").className = "tab " + (tab==="play"?"active":"inactive");
  document.getElementById("tab-verbs").className = "tab " + (tab==="verbs"?"active":"inactive");
  document.getElementById("tab-chat").className = "tab " + (tab==="chat"?"active":"inactive");
  document.getElementById("panel-play").style.display = tab==="play"?"block":"none";
  document.getElementById("panel-verbs").style.display = tab==="verbs"?"block":"none";
  document.getElementById("panel-chat").style.display = tab==="chat"?"block":"none";
  if (tab==="chat") buildScenarioList();
}

function getFiltered() {
  return allCards.filter(c => {
    const lvl = selectedLevel==="All" || c.level===selectedLevel;

    return lvl && cat;

let quizLen = 10;
function setQuizLen(n, btn) {
  quizLen = n;

function generateOptions(correct, all) {
  const others = all.filter(c => c.es !== correct.es);

  function score(a, b) {
    let s = 0;
    const aF = a.fr.toLowerCase(), bF = b.fr.toLowerCase();
    // Same level = harder
    if (a.level === b.level) s += 4;
    // Same category = thematically tricky
    if (a.category === b.category) s += 5;
    // Both questions or both not
    if (aF.includes('?') === bF.includes('?')) s += 3;
    // Both negations
    const neg = s => /ne|n'/.test(s);
    if (neg(aF) === neg(bF)) s += 2;
    // Similar first word (je/tu/il/vous…)
    const fw = s => s.split(/\s+/)[0];
    if (fw(aF) === fw(bF)) s += 3;
    // Similar length
    const ratio = Math.min(aF.length, bF.length) / Math.max(aF.length, bF.length);
    if (ratio > 0.65) s += 2;
    // Shared content word — makes it really tricky
    const words = s => new Set(s.split(/\s+/).filter(w => w.length > 3));
    const aw = words(aF), bArr = bF.split(/\s+/).filter(w => w.length > 3);
    if (bArr.some(w => aw.has(w))) s += 4;
    return s;
  }

  const scored = others.map(c => ({ c, s: score(correct, c) }));
  scored.sort((a, b) => b.s - a.s);
  const pool = scored.slice(0, Math.min(10, scored.length)).map(x => x.c);
  return shuffle([correct, ...shuffle(pool).slice(0, 3)]);
}

// Shared AudioContext — one instance avoids pops/glitches on Android
let sharedAudioCtx = null;
function getAudioCtx() {
  if (!sharedAudioCtx || sharedAudioCtx.state === "closed") {
    sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (sharedAudioCtx.state === "suspended") sharedAudioCtx.resume();

// ─── SPEECH RECOGNITION ────────────────────────────────────────────────────
function resetMicUI(targetFr, containerId) {
  const s = document.getElementById("mic-status-text-"+containerId);
  if (s) s.textContent = "Click 🎤 to try again";
  if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout=null; }
}

function startRecognition(targetFr, containerId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    const r=document.getElementById("speak-result-"+containerId);
    if(r) r.innerHTML=`<div style="color:#f87171;font-size:0.75rem;">Use Chrome for speech recognition.</div>`;
    return;
  }
  if (recognition) { try{recognition.abort();}catch(e){} recognition=null; }
  if (recognitionTimeout) { clearTimeout(recognitionTimeout); recognitionTimeout=null; }

  recognition = new SR();
  recognition.lang = "fr-FR";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;

  const resEl = document.getElementById("speak-result-"+containerId);
  const statusEl = document.getElementById("mic-status-text-"+containerId);
  const compareEl = document.getElementById("phonetic-compare-"+containerId);

  if (statusEl) statusEl.textContent = "🔴 Listening...";

  recognitionTimeout = setTimeout(()=>{
    if (recognition) { try{recognition.abort();}catch(e){} recognition=null; }
    if (statusEl) statusEl.textContent="⏱ Timed out — try again";
    setTimeout(()=>{ if(!spokePassed) startRecognition(targetFr,containerId); }, 800);
  }, 7000);

  recognition.onresult = (e) => {
    clearTimeout(recognitionTimeout); recognitionTimeout=null;

    const alternatives = Array.from(e.results[0]).map(r=>r.transcript.trim());
    const targetLen = normalize(targetFr).length;
    const valid = alternatives.filter(t=>t.length >= Math.max(2, targetLen*0.35));

    if (valid.length===0) {
      if (statusEl) statusEl.textContent="🔇 Noise — speak clearly in French!";
      setTimeout(()=>{ if(!spokePassed) startRecognition(targetFr,containerId); }, 1000);
      return;
    }

    // Pick best-scoring alternative
    const scored = valid.map(t=>({t, score:phoneticSimilarity(t,targetFr)}));
    scored.sort((a,b)=>b.score-a.score);
    const best = scored[0].t, similarity = scored[0].score;

    // Show what was heard always (helps debug)
    if (resEl) resEl.innerHTML=`<div style="font-size:0.72rem;color:#555;margin-bottom:4px;">Heard: "<span style="color:#888;">${best}</span>" · <span style="color:#444;">${Math.round(similarity*100)}% match</span></div>`;

    if (isNoise(best, targetFr)) {
      if (statusEl) statusEl.textContent="🔇 Background noise — say it in French!";
      setTimeout(()=>{ if(!spokePassed) startRecognition(targetFr,containerId); }, 1000);
      return;
    }

    if (similarity >= 0.68) {
      failCount=0; playSuccessSound(); spokePassed=true;
      if (compareEl) compareEl.innerHTML="";
      if (resEl) resEl.innerHTML=`<div style="color:#4ade80;font-size:0.8rem;font-weight:700;letter-spacing:1px;">✓ PARFAIT!</div>`;
      renderCard(lastMode);
    } else {
      failCount++;
      playFailSound();
      if (compareEl) compareEl.innerHTML = phoneticCompare(best, targetFr);
      if (statusEl) statusEl.textContent=`✗ Try again (attempt ${failCount})`;

      if (failCount>=3) {
        if (statusEl) statusEl.textContent=`🐢 Listen then repeat (attempt ${failCount})`;
        setTimeout(()=>speakSlow(targetFr), 200);
        const skipEl=document.getElementById("skip-hint-"+containerId);
        if (skipEl) skipEl.style.display="block";
      }
      setTimeout(()=>{ if(!spokePassed) startRecognition(targetFr,containerId); }, failCount>=3?3000:1500);
    }
  };

  recognition.onerror = (e) => {
    clearTimeout(recognitionTimeout); recognitionTimeout=null;
    if (e.error==="no-speech") {
      if (statusEl) statusEl.textContent="🔇 Nothing heard — speak louder!";
      setTimeout(()=>{ if(!spokePassed) startRecognition(targetFr,containerId); }, 1000);
    } else if (e.error==="not-allowed") {
      if (resEl) resEl.innerHTML=`<div style="color:#f87171;font-size:0.75rem;">🚫 Mic blocked. Click 🔒 in Chrome's address bar.</div>`;
    } else if (e.error==="aborted") {
      // intentional
    } else {
      if (statusEl) statusEl.textContent=`⚠ ${e.error} — retrying...`;
      setTimeout(()=>{ if(!spokePassed) startRecognition(targetFr,containerId); }, 1000);
    }
  };

  recognition.onend = () => {
    clearTimeout(recognitionTimeout); recognitionTimeout=null;
    mobileRecognitionActive=false;
    const mBtn=document.getElementById("mobile-mic-btn-"+containerId);
    if (mBtn) { mBtn.textContent="🎤 TAP TO SPEAK"; mBtn.style.background="linear-gradient(135deg,#10b981,#059669)"; }
    recognition=null;
  };

  try { recognition.start(); }
  catch(e) {
    if (resEl) resEl.innerHTML=`<div style="font-size:0.75rem;color:#555;">⚠ Could not start mic.</div>`;
  }
}

// ── BELL (correct) ───────────────────────────────────────────────────────────
function playBellSound() {
  try {
    const ctx = getAudioCtx();
    [[523,0],[659,0.07],[784,0.14]].forEach(([freq,delay]) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
      osc.start(t); osc.stop(t + 0.9);
    });
  } catch(e) {}
}

// ── BUZZ (wrong) ─────────────────────────────────────────────────────────────
function playBuzzSound() {
  try {
    const ctx = getAudioCtx();
    const osc  = ctx.createOscillator();
    const dist = ctx.createWaveShaper();
    const gain = ctx.createGain();
    // Distortion curve
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i*2/256)-1; curve[i] = (Math.PI+300)*x/(Math.PI+300*Math.abs(x)); }
    dist.curve = curve;
    osc.connect(dist); dist.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(280, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.35);
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

  if (ttsCache.has(cacheKey)) {
    const audio = new Audio(ttsCache.get(cacheKey));
    audio.play().catch(() => browserFallback(text, slow));
    return;
  }

  try {
    const res = await fetch(`${WORKER_URL}/tts`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, voice, slow })
    });

    if (!res.ok) throw new Error("TTS fetch failed");
    const { audioBase64, mimeType } = await res.json();

    // Decode base64 → Blob → URL
    const binary = atob(audioBase64);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob   = new Blob([bytes], { type: mimeType || "audio/wav" });
    const url    = URL.createObjectURL(blob);

    ttsCache.set(cacheKey, url);
    const audio = new Audio(url);
    audio.play().catch(() => browserFallback(text, slow));

  } catch (e) {
    console.warn("Gemini TTS failed, using browser fallback:", e);
    browserFallback(text, slow);
  }
}

// Browser TTS fallback (used if Worker unreachable)
function browserFallback(text, slow = false) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = "fr-FR";
  utt.rate  = slow ? 0.5 : 0.88;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith("fr"));
  if (v) utt.voice = v;
  window.speechSynthesis.speak(utt);
}

// Public API — used everywhere in the app
function speakText(text, lang) {
  if (lang && !lang.startsWith("fr")) {
    // Non-French (e.g. English) — use browser TTS
    browserFallback(text, false);
    return;
  }
  const persona = currentPersona || pickPersona();
  playGeminiTTS(text, persona.voice, false);
}

function speakSlow(text) {
  // Slow mode: use Kore voice (clearest for slow speech)
  playGeminiTTS(text, "Kore", true);
}

// ─── PHONETICS ─────────────────────────────────────────────────────────────
// ─── PHONETIC ENGINE ────────────────────────────────────────────────────────

// Strip accents, punctuation, lowercase
function normalize(s) {
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[.,!?¿¡'"«»\-]/g,"")
    .replace(/\s+/g," ").trim();
}

// French phonetic folding: map common sound-alikes so "on/ont/ont", "est/et/ai", etc. match
function phonoFold(s) {
  return s
    .replace(/eau|aux|au/g,"o")
    .replace(/ain|ein|in|un|im|yn/g,"an")
    .replace(/ais|ait|aient|ai|ei/g,"e")
    .replace(/eux|eu/g,"e")
    .replace(/ou/g,"u")
    .replace(/oi/g,"wa")
    .replace(/ch/g,"sh")
    .replace(/ph/g,"f")
    .replace(/gn/g,"ny")
    .replace(/qu/g,"k")
    .replace(/ll/g,"l")
    .replace(/ss/g,"s")
    .replace(/([aeiou])s([aeiou])/g,"$1z$2") // liaison s→z
    .replace(/x$/g,"")       // silent final x
    .replace(/s$/g,"")       // silent final s
    .replace(/t$/g,"")       // silent final t
    .replace(/d$/g,"")       // silent final d
    .replace(/z$/g,"")       // silent final z
    .replace(/[ée]/g,"e")
    .replace(/[àâa]/g,"a")
    .replace(/[îi]/g,"i")
    .replace(/[ôo]/g,"o")
    .replace(/[ùûu]/g,"u")
    .replace(/h/g,"");       // silent h
}

function levenshtein(a,b) {
  const m=a.length, n=b.length;
  if (!m) return n; if (!n) return m;
  const dp=[];
  for(let i=0;i<=m;i++) { dp[i]=[i]; }
  for(let j=0;j<=n;j++) { dp[0][j]=j; }
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// Score a single word pair 0..1
function wordScore(sw, tw) {
  if (!tw.length) return 1;
  if (sw===tw) return 1;
  // try phonoFold
  const sf=phonoFold(sw), tf=phonoFold(tw);
  if (sf===tf) return 0.95;
  // substring bonus
  if (tw.includes(sw)||sw.includes(tw)) return 0.85;
  // levenshtein on folded
  const d=levenshtein(sf,tf);
  const ratio=1-d/Math.max(sf.length,tf.length,1);
  return Math.max(ratio, 0);
}

// Main similarity: best-alignment word matching (handles dropped articles, liaisons)
function phoneticSimilarity(spoken, target) {
  const s=normalize(spoken), t=normalize(target);
  if (s===t) return 1.0;
  if (!s||!t) return 0.0;

  const sw=s.split(" ").filter(Boolean);
  const tw=t.split(" ").filter(Boolean);

  // Skip filler/article words for noise detection
  const fillers=new Set(["le","la","les","l","de","du","des","un","une","a","au","aux","je","tu","il","elle","nous","vous","ils","elles","et","est","en","on"]);

  // For each target word, find best matching spoken word (flexible order)
  let totalScore=0;
  const usedIdx=new Set();
  tw.forEach(tw_w => {
    let best=0, bestIdx=-1;
    sw.forEach((sw_w,i)=>{
      if (usedIdx.has(i)) return;
      const sc=wordScore(sw_w,tw_w);
      if (sc>best) { best=sc; bestIdx=i; }
    });
    if (bestIdx>=0 && best>0.4) usedIdx.add(bestIdx);
    // Weight content words more than fillers
    const weight=fillers.has(tw_w)?0.5:1.0;
    totalScore+=best*weight;
  });

  // Normalize by weighted target length
  const totalWeight=tw.reduce((s,w)=>s+(fillers.has(w)?0.5:1.0),0);
  const wordSim=totalScore/Math.max(totalWeight,1);

  // Coverage: penalize if spoken is much longer (added random words)
  const lenRatio=Math.min(sw.length,tw.length)/Math.max(sw.length,tw.length,1);

  // Combine: word similarity is primary
  return Math.min(1.0, wordSim*0.8 + lenRatio*0.2);
}

// Noise threshold: check if transcript looks totally unrelated
function isNoise(spoken, target) {
  const s=normalize(spoken), t=normalize(target);
  // If spoken is just 1 word and target has 3+, likely noise
  const sw=s.split(" ").filter(Boolean);
  const tw=t.split(" ").filter(Boolean);
  if (sw.length===1 && tw.length>=3) {
    const score=wordScore(sw[0], tw[0])||wordScore(sw[0], tw[tw.length-1]);
    return score<0.5;
  }
  return phoneticSimilarity(spoken,target)<0.22;
}

function phoneticCompare(spoken, target) {
  const sw=normalize(spoken).split(" ").filter(Boolean);
  const tw=normalize(target).split(" ").filter(Boolean);
  const targetOrig=target.split(" ");

  // Match each target word to best spoken word
  const usedIdx=new Set();
  const matches=tw.map(tw_w=>{
    let best=0, bestIdx=-1;
    sw.forEach((sw_w,i)=>{
      if (usedIdx.has(i)) return;
      const sc=wordScore(sw_w,tw_w);
      if (sc>best) { best=sc; bestIdx=i; }
    });
    if (bestIdx>=0 && best>0.4) usedIdx.add(bestIdx);
    return { score:best, spokenWord: bestIdx>=0?sw[bestIdx]:"—" };
  });

  let html='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:6px 0;">';
  tw.forEach((tw_w,i)=>{
    const sc=matches[i].score;
    const color=sc>=0.85?"#4ade80":sc>=0.6?"#facc15":"#f87171";
    const orig=targetOrig[i]||tw_w;
    html+=`<span style="display:inline-flex;flex-direction:column;align-items:center;gap:1px;">
      <span style="color:${color};font-weight:700;font-size:0.9rem;">${orig}</span>
      <span style="color:#333;font-size:0.6rem;">${matches[i].spokenWord}</span>
    </span>`;
  });
  html+="</div>";

  // Find worst word for tip
  let worstScore=1, worstWord="";
  tw.forEach((w,i)=>{ if(matches[i].score<worstScore){worstScore=matches[i].score;worstWord=targetOrig[i]||w;} });
  const tip = worstScore<0.6
    ? `💡 Focus on: <strong style="color:#facc15">${worstWord}</strong>`
    : sw.length < tw.length*0.7 ? "💡 Say the full phrase" : "";

  return html+(tip?`<div style="font-size:0.7rem;color:#555;margin-top:2px;">${tip}</div>`:"");
}

function orAnswer(idx) {
  if (selectedOpt !== null) return;
  orStop();
  selectedOpt = idx;
  const card    = currentCard();
  const isOk    = options[idx].es === card.es;
  if (isOk) { score++; playBellSound(); }
  else { playBuzzSound(); if (navigator.vibrate) navigator.vibrate([80,40,80]); }

  // Color options
  const optEl = document.getElementById('or-options');
  Array.from(optEl.children).forEach((btn, i) => {
    btn.disabled = true;
    const iC = options[i].es === card.es;
    if (i === idx && isOk)  { btn.style.background='rgba(74,222,128,0.1)';  btn.style.borderColor='#4ade80'; btn.style.color='#4ade80'; btn.innerHTML += '<span>✓</span>'; }
    else if (i === idx)     { btn.style.background='rgba(248,113,113,0.1)'; btn.style.borderColor='#f87171'; btn.style.color='#f87171'; btn.innerHTML += '<span>✗</span>'; }
    else if (iC)            { btn.style.borderColor='#4ade8050'; btn.style.color='#4ade8070'; }
    else                    { btn.style.color = '#2a2a2a'; }
  });

  // Reveal the French text now
  document.getElementById('or-reveal-text').textContent = card.fr;
  document.getElementById('or-reveal').style.display = 'block';
  document.getElementById('or-score').textContent = score;

  setTimeout(nextCard, 1400);
}

function orTimedOut() {
  if (selectedOpt !== null) return;
  selectedOpt = -1;
  playBuzzSound();
  if (navigator.vibrate) navigator.vibrate([80,40,80]);
  const card  = currentCard();
  const optEl = document.getElementById('or-options');
  Array.from(optEl.children).forEach((btn, i) => {
    btn.disabled = true;
    if (options[i].es === card.es) { btn.style.color='#4ade80'; btn.style.borderColor='#4ade80'; btn.innerHTML += '<span style="font-size:0.65rem;margin-left:6px;letter-spacing:1px;">← CORRECT</span>'; }
    else btn.style.color = '#2a2a2a';
  });
  document.getElementById('or-reveal-text').textContent = card.fr;
  document.getElementById('or-reveal').style.display = 'block';
  setTimeout(nextCard, 2000);
}

// Timer
function orStartTimer() {
  orStop();
  orTimeLeft = OR_SECS;
  orUpdateBar();
  orTimer = setInterval(() => {
    orTimeLeft--;
    orUpdateBar();
    if (orTimeLeft <= 0) { orStop(); orTimedOut(); }
  }, 1000);
}
function orStop() { if (orTimer) { clearInterval(orTimer); orTimer = null; } }
function orUpdateBar() {
  const bar   = document.getElementById('or-timer-bar');
  const label = document.getElementById('or-timer-label');
  if (!bar) return;
  const pct = (orTimeLeft / OR_SECS) * 100;

let convHistory = [];
let currentScenario = null;
let convMicActive = false;
let convRecognition = null;
let hintVisible = false;

function buildScenarioList() {
  const el = document.getElementById("scenario-list");
  if (!el) return;
  el.innerHTML = `<div style="font-size:0.6rem;color:#222;letter-spacing:2px;margin-bottom:10px;">FRANCE</div>`;

  const groups = [
    { label:"🇫🇷 France", ids:["cafe","cafe2","pharmacy","police","hotel","doctor","market","neighbor","job"] },
    { label:"🌎 Other accents", ids:["quebec","belgium","africa"] },
  ];

  groups.forEach(g => {
    const header = document.createElement("div");
    header.style.cssText = "font-size:0.58rem;color:#333;letter-spacing:2px;text-transform:uppercase;margin:10px 0 6px;";
    header.textContent = g.label;
    el.appendChild(header);

    g.ids.forEach(id => {
      const sc = scenarios.find(s=>s.id===id);
      if (!sc) return;
      const btn = document.createElement("div");
      btn.style.cssText = `
        display:flex;align-items:center;gap:12px;
        padding:12px 14px;border:1px solid #1a1a1a;border-radius:5px;
        cursor:pointer;margin-bottom:5px;background:#0e0e0e;
        transition:border-color 0.15s;
      `;
      btn.innerHTML = `
        <div style="font-size:1.6rem;line-height:1;flex-shrink:0;">${sc.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:0.85rem;">${sc.title}</div>
          <div style="font-size:0.62rem;color:#333;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sc.character.name}</div>
        </div>
        <div style="font-size:0.55rem;font-weight:900;padding:2px 6px;border-radius:2px;background:${sc.color};color:#000;flex-shrink:0;">${sc.level}</div>
      `;
      btn.onmouseenter = ()=>btn.style.borderColor="#2a2a2a";
      btn.onmouseleave = ()=>btn.style.borderColor="#1a1a1a";
      btn.onclick = ()=>startConversation(sc);
      el.appendChild(btn);
    });
  });
}

async function startConversation(sc) {
  currentScenario = sc;
  convHistory = [];
  hintVisible = false;

  document.getElementById("conv-title").textContent = sc.title;
  document.getElementById("conv-level-tag").textContent = sc.character.name + " · " + sc.level;
  document.getElementById("conv-char-avatar").textContent = sc.emoji;
  document.getElementById("conv-messages").innerHTML = "";
  document.getElementById("conv-hint").style.display = "none";
  document.getElementById("conv-input").value = "";
  document.getElementById("conv-mic-status").textContent = "";

  showSection("s-conv");

  appendMessage("system", "Starting conversation...", true);
  const opening = await callClaude([{role:"user", content:"(Start the conversation — say your opening line only, in French.)"}]);
  clearLoadingMsg();
  if (opening) {
    convHistory.push({role:"assistant", content:opening});
    appendMessage("assistant", opening, false, sc.emoji);
    speakConv(opening, sc.character);
  }
}

async function sendConvMessage() {
  const input = document.getElementById("conv-input");
  const text = input.value.trim();
  if (!text || !currentScenario) return;
  input.value = "";

  convHistory.push({role:"user", content:text});
  appendMessage("user", text, false);
  appendMessage("system", "...", true);

  const reply = await callClaude(convHistory);
  clearLoadingMsg();
  if (reply) {
    convHistory.push({role:"assistant", content:reply});
    appendMessage("assistant", reply, false, currentScenario.emoji);
    speakConv(reply, currentScenario.character);
    if (hintVisible) showHint();
  }
}

// ─── VOICE ENGINE — browser TTS ───────────────────────────────────────────
function speakConv(text, character) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = character.lang || "fr-FR";
  utt.rate = character.rate || 1.0;
  utt.pitch = character.pitch || 1.0;

  const voices = window.speechSynthesis.getVoices();
  const frVoices = voices.filter(v => v.lang.startsWith(character.lang?.split("-")[0] || "fr"));

  let chosen = null;
  if (character.gender === "female") {
    chosen = frVoices.find(v => /amelie|aurelie|marie|sophie|elsa|celine|alice|julie|audrey|virginie|florence/i.test(v.name));
  }
  if (!chosen && character.gender === "male") {
    chosen = frVoices.find(v => /thomas|pierre|nicolas|jean|paul|felix|bruno|martin|yannick/i.test(v.name));
  }
  if (!chosen) chosen = frVoices[0] || null;
  if (chosen) utt.voice = chosen;

  window.speechSynthesis.speak(utt);
}

// ─── CLAUDE API via built-in proxy ────────────────────────────────────────
async function callClaude(messages) {
  try {
    const res = await fetch("https://francais-flash.vacm182.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: currentScenario.systemPrompt,
        messages: messages
      })
    });
    const data = await res.json();
    if (data.content && data.content[0]) return data.content[0].text;
    if (data.error) return `⚠ ${data.error.message}`;
    return null;
  } catch(e) {
    return "⚠ Error — please try again.";
  }
}

async function toggleHint() {
  hintVisible = !hintVisible;
  const el = document.getElementById("conv-hint");
  if (!hintVisible) { el.style.display = "none"; return; }
  el.style.display = "block";
  el.textContent = "Loading hint...";
  showHint();
}

async function showHint() {
  const el = document.getElementById("conv-hint");
  if (!el || !currentScenario) return;
  const hintMessages = [
    ...convHistory,
    {role:"user", content:"(Out of character: Give me 3 short example French replies I could say right now, with English in parentheses. Format each as: · French (English). No intro text, just the 3 lines.)"}
  ];
  const hint = await callClaude(hintMessages);
  if (hint) el.innerHTML = hint.replace(/\n/g,"<br>");
}

function appendMessage(role, text, isLoading, avatar) {
  const el = document.getElementById("conv-messages");
  const div = document.createElement("div");

  if (role === "system") {
    div.className = "conv-loading";
    div.style.cssText = "text-align:center;color:#222;font-size:0.7rem;letter-spacing:1px;padding:6px 0;";
    div.textContent = text;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
    return;
  }

  const isUser = role === "user";
  div.style.cssText = `display:flex;gap:8px;align-items:flex-start;${isUser?"flex-direction:row-reverse;":""}`;

  if (!isUser && avatar) {
    const av = document.createElement("div");
    av.style.cssText = "font-size:1.3rem;flex-shrink:0;margin-top:3px;";
    av.textContent = avatar;
    div.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.style.cssText = `
    max-width:82%;padding:10px 13px;
    border-radius:${isUser?"12px 12px 2px 12px":"12px 12px 12px 2px"};
    font-size:0.88rem;line-height:1.55;
    background:${isUser?"#fff":"#1a1a1a"};
    color:${isUser?"#000":"#ddd"};
    border:${isUser?"none":"1px solid #2a2a2a"};
    white-space:pre-wrap;
  `;
  bubble.textContent = text;
  div.appendChild(bubble);

  if (!isUser) {
    const spkBtn = document.createElement("button");
    spkBtn.textContent = "🔊";
    spkBtn.style.cssText = "background:none;border:none;cursor:pointer;font-size:0.75rem;opacity:0.3;padding:2px;margin-top:10px;flex-shrink:0;";
    spkBtn.onclick = () => speakConv(text, currentScenario.character);
    div.appendChild(spkBtn);
  }

  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function clearLoadingMsg() {
  document.getElementById("conv-messages").querySelectorAll(".conv-loading").forEach(l=>l.remove());
}

function toggleConvMic() {
  convMicActive ? stopConvMic() : startConvMic();
}

function startConvMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById("conv-mic-status").textContent = "Use Chrome for mic"; return; }
  convMicActive = true;
  const btn = document.getElementById("conv-mic-btn");
  const status = document.getElementById("conv-mic-status");
  btn.textContent = "⏹ STOP"; btn.style.color = "#f87171";
  status.textContent = "🔴 Listening...";

  convRecognition = new SR();
  convRecognition.lang = "fr-FR";
  convRecognition.continuous = false;
  convRecognition.interimResults = false;
  convRecognition.maxAlternatives = 3;
  convRecognition.onresult = (e) => {
    document.getElementById("conv-input").value = e.results[0][0].transcript.trim();
    status.textContent = "✓ Got it — hit Send";
    stopConvMic();
  };
  convRecognition.onerror = (e) => { status.textContent = e.error; stopConvMic(); };
  convRecognition.onend = () => stopConvMic();
  try { convRecognition.start(); } catch(e) { stopConvMic(); }
}

function stopConvMic() {
  convMicActive = false;
  if (convRecognition) { try{convRecognition.abort();}catch(e){} convRecognition=null; }
  const btn = document.getElementById("conv-mic-btn");
  if (btn) { btn.textContent = "🎤 MIC"; btn.style.color = "#888"; }
}

init();
buildScenarioList();
</script>
